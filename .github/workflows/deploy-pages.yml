name: Deploy Web MVP To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production JavaScript
        run: |
          node --check web_mvp/main.js
          node --check web_mvp/platform.js
          node --check web_mvp/admin.js

      - name: Validate mobile shell and game simulation
        run: |
          node scripts/check_mobile_manifest.mjs
          node scripts/simulate_core_30turns.mjs
          node scripts/simulate_thumb_flow_30days.mjs
          CHROME=/usr/bin/google-chrome node scripts/smoke_mobile_grid.mjs

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_mvp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
